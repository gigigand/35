<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <form >
    <div class="mb-3">
      <label for="exampleInputName1" class="form-label">Имя</label>
      <input  type="text" class="form-control" id="exampleInputName1" aria-describedby="textHelp">
      <div id="textHelp" class="form-text">Мы никогда никому не передадим ваши данные.</div>
    </div>
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Адрес электронной почты</label>
      <input  type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
      <div id="emailHelp" class="form-text">Мы никогда никому не передадим вашу электронную почту.</div>
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Введите пароль</label>
      <input  type="password" class="form-control" id="exampleInputPassword1">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword2" class="form-label">Подтверждение пароля</label>
      <input  type="password" class="form-control" id="exampleInputPassword2">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="exampleCheck1">
      <label class="form-check-label" for="exampleCheck1">Запомни меня</label>
    </div>
    <div class="i" class="btn-group" role="group" aria-label="Basic mixed styles example">
      <button type="button" class="btn btn-danger">Ж</button>
      <button type="button" class="btn btn-success">М</button>
    </div>
    <div class="i" class="dropdown">
      <button class="btn btn-info dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Страны
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">Португалия</a></li>
        <li><a class="dropdown-item" href="#">Лесото</a></li>
        <li><a class="dropdown-item" href="#">Чили</a></li>
      </ul>
    </div>
    <input type="checkbox" id="toggle-img" class="toggle-input">
    <a href="https://gigigand.github.io/38/">
      <label for="toggle-img" class="toggle-button">Отправить</label>
    </a> 



    
  </form>
</body>


</html>
